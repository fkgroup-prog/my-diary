<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>My Diary</title>
<style>
:root {
  --ink: #1a1a2e;
  --ink-light: #4a4a6a;
  --ink-ghost: #9090b0;
  --page: #f8f7f4;
  --page-warm: #f0ede6;
  --rule: #e2ddd6;
  --accent: #009FD4;
  --accent-soft: #e6f6fb;
  --accent-mid: #007aaa;
  --danger: #c0392b;
  --tag-bg: #eef9fd;
  --tag-border: #b3e5f5;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--page-warm);
  color: var(--ink);
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* HEADER */
header {
  background: var(--ink);
  color: #fff;
  padding: 14px 16px 0;
  position: sticky; top: 0; z-index: 100;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
header h1 { font-size: 17px; font-weight: 700; letter-spacing: .04em; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-date { font-size: 12px; color: #aaa; }
.tabs { display: flex; border-top: 1px solid #333; }
.tabs button {
  flex: 1; padding: 9px 4px;
  background: none; border: none; color: #888;
  font-size: 11px; font-weight: 600; letter-spacing: .03em; cursor: pointer;
}
.tabs button.active { color: var(--accent); border-top: 2px solid var(--accent); margin-top: -1px; }

/* SYNC BADGE */
.sync-badge {
  font-size: 14px; cursor: pointer; opacity: 0.85;
  padding: 2px 4px; border-radius: 4px;
}
.sync-badge:hover { opacity: 1; }

/* MAIN */
main { padding: 14px; max-width: 560px; margin: 0 auto; padding-bottom: 40px; }

/* CARD */
.card {
  background: var(--page);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  margin-bottom: 12px;
}
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-ghost); margin-bottom: 8px;
}
.divider { height: 1px; background: var(--rule); margin: 12px 0; }

/* DATE ROW */
.date-row { display: flex; align-items: center; gap: 8px; }
.date-row input[type="date"] {
  flex: 1; padding: 9px 10px;
  border: 1.5px solid var(--rule); border-radius: 8px;
  font-size: 14px; font-family: inherit; color: var(--ink);
  background: var(--page); outline: none;
}
.date-row input[type="date"]:focus { border-color: var(--accent); }
.btn-today {
  padding: 9px 12px; border-radius: 8px;
  background: var(--accent-soft); color: var(--accent-mid);
  border: 1.5px solid var(--tag-border);
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}

/* WEATHER */
.weather-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.weather-chip {
  font-size: 22px; cursor: pointer; padding: 4px 6px; border-radius: 8px;
  border: 2px solid transparent; transition: all .15s;
}
.weather-chip.selected { border-color: var(--accent); background: var(--accent-soft); }
.weather-auto {
  font-size: 11px; color: var(--accent-mid); cursor: pointer;
  padding: 4px 10px; border-radius: 12px; border: 1px solid var(--tag-border);
  background: var(--accent-soft); margin-left: 4px;
}

/* TAGS */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  padding: 5px 11px; border-radius: 20px;
  background: var(--tag-bg); border: 1.5px solid var(--tag-border);
  font-size: 12px; color: var(--ink-light); cursor: pointer; user-select: none;
  transition: all .15s;
}
.tag-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

/* SUB-ENTRY FORM */
.sub-form {
  background: var(--accent-soft);
  border: 1.5px solid var(--tag-border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}
.sub-form textarea {
  width: 100%; padding: 9px 10px;
  border: 1.5px solid var(--rule); border-radius: 8px;
  font-size: 14px; font-family: inherit; color: var(--ink);
  background: var(--page); resize: none; outline: none;
  line-height: 1.65; min-height: 72px; margin-top: 8px;
}
.sub-form textarea:focus { border-color: var(--accent); }
.sub-form-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 2px; }
.sub-form-actions { display: flex; gap: 6px; margin-top: 8px; }

/* BUTTONS */
.btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost { background: var(--rule); color: var(--ink-light); }
.btn-danger { background: #fdecea; color: var(--danger); }
.btn-add {
  width: 100%; padding: 10px; border-radius: 8px;
  border: 1.5px dashed var(--tag-border); background: var(--accent-soft);
  color: var(--accent-mid); font-size: 13px; font-weight: 700; cursor: pointer;
  margin-top: 4px;
}
.btn-save {
  width: 100%; padding: 13px; border-radius: 10px;
  background: var(--accent); color: #fff; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
  letter-spacing: .02em;
}

/* DAY CARD (list view) */
.day-card {
  background: var(--page);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.day-header {
  background: var(--ink); color: #fff;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.day-header-date { font-size: 13px; font-weight: 700; }
.day-header-right { display: flex; align-items: center; gap: 8px; }
.day-weather { font-size: 18px; }
.btn-photos {
  font-size: 11px; padding: 4px 10px; border-radius: 12px;
  background: rgba(255,255,255,0.15); color: #fff; border: none; cursor: pointer;
}
.day-body { padding: 10px 14px; }

/* SUB-ENTRY ROW */
.sub-entry {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 0; border-bottom: 1px solid var(--rule);
}
.sub-entry:last-child { border-bottom: none; }
.sub-entry-tags { display: flex; flex-wrap: wrap; gap: 4px; min-width: 0; flex-shrink: 0; max-width: 40%; }
.sub-entry-tag {
  font-size: 11px; padding: 3px 8px; border-radius: 12px;
  background: var(--tag-bg); border: 1px solid var(--tag-border);
  color: var(--accent-mid); font-weight: 600; white-space: nowrap;
}
.sub-entry-memo { font-size: 14px; line-height: 1.6; color: var(--ink); flex: 1; white-space: pre-wrap; }
.sub-entry-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-xs {
  padding: 3px 8px; border-radius: 5px; border: none;
  font-size: 11px; font-weight: 700; cursor: pointer;
}
.btn-xs.edit { background: var(--accent-soft); color: var(--accent-mid); }
.btn-xs.del { background: #fdecea; color: var(--danger); }

/* SEARCH */
.search-box {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.search-box input {
  flex: 1; padding: 10px 12px; border-radius: 8px;
  border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit;
  background: var(--page); color: var(--ink); outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-hit { background: rgba(0,159,212,0.15); border-radius: 2px; }

/* FILTER */
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.filter-chip {
  padding: 5px 11px; border-radius: 20px;
  background: var(--page); border: 1.5px solid var(--rule);
  font-size: 11px; color: var(--ink-light); cursor: pointer;
}
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

/* 10-YEAR */
.mmdd-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.mmdd-row select {
  flex: 1; padding: 9px 8px; border-radius: 8px;
  border: 1.5px solid var(--rule); font-size: 14px; font-family: inherit;
  background: var(--page); color: var(--ink); outline: none;
}
.mmdd-row select:focus { border-color: var(--accent); }
.mmdd-sep { font-size: 16px; color: var(--ink-ghost); }
.year-block { background: var(--page); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden; }
.year-block-header { background: var(--ink); color: #fff; padding: 9px 14px; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }

/* SETTINGS */
.tag-manage-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tag-add-row { display: flex; gap: 8px; margin-top: 8px; }
.tag-add-row input {
  flex: 1; padding: 8px 10px; border-radius: 8px;
  border: 1.5px solid var(--rule); font-size: 13px; font-family: inherit;
  background: var(--page); color: var(--ink); outline: none;
}
.tag-add-row input:focus { border-color: var(--accent); }
.export-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* DRIVE SYNC STATUS */
.drive-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 8px;
  background: var(--accent-soft); border: 1px solid var(--tag-border);
  font-size: 12px; margin-bottom: 12px;
}
.drive-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.drive-status-dot.synced { background: #27ae60; }
.drive-status-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.drive-status-dot.error { background: var(--danger); }
.drive-status-dot.noauth { background: #aaa; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(--ink-ghost); }
.empty .icon { font-size: 36px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: #fff;
  padding: 9px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: flex-end;
}
.modal {
  background: var(--page); border-radius: 20px 20px 0 0;
  width: 100%; padding: 20px 16px 36px; max-height: 85vh; overflow-y: auto;
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📓 My Diary</h1>
    <div class="header-right">
      <span id="syncBadge" class="sync-badge" onclick="onSyncBadgeClick()" title=""></span>
      <span class="header-date" id="headerDate"></span>
    </div>
  </div>
  <div class="tabs">
    <button class="active" onclick="switchTab('write')">✏️ 書く</button>
    <button onclick="switchTab('list')">📋 一覧</button>
    <button onclick="switchTab('tenyear')">🗓 10年</button>
    <button onclick="switchTab('search')">🔍 検索</button>
    <button onclick="switchTab('settings')">⚙️ 設定</button>
  </div>
</header>

<main id="mainContent"></main>
<div class="toast" id="toast"></div>
<div id="modalContainer"></div>

<script>
// ── GOOGLE DRIVE SYNC ──
// Replace with your Google Cloud OAuth Client ID
const GAPI_CLIENT_ID = '683831276042-htpqdp5lk6o5phmskmrassqjv96anvh3.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME = 'diary_data.json';

let gisInited = false;
let tokenClient = null;
let driveToken = null;
let syncStatus = 'noauth'; // 'noauth'|'idle'|'syncing'|'synced'|'error'

function gisLoaded() {
  if (GAPI_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') return; // not configured yet
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if (resp.error) {
        if (resp.error !== 'interaction_required' && resp.error !== 'access_denied') {
          showToast('Drive認証エラー: ' + resp.error);
        }
        syncStatus = 'noauth';
        updateSyncUI();
        return;
      }
      driveToken = resp.access_token;
      if (resp.hint) localStorage.setItem('diary_google_hint', resp.hint);
      syncFromDrive();
    },
  });
  gisInited = true;

  // Try silent auto-login if hint is saved
  const hint = localStorage.getItem('diary_google_hint');
  if (hint) {
    tokenClient.requestAccessToken({ prompt: 'none', hint });
  }
}

function signInWithGoogle() {
  if (!gisInited) { showToast('Googleライブラリ読込中…'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}

function signOutGoogle() {
  if (driveToken) {
    google.accounts.oauth2.revoke(driveToken, () => {});
    driveToken = null;
  }
  localStorage.removeItem('diary_google_hint');
  syncStatus = 'noauth';
  updateSyncUI();
  showToast('ログアウトしました');
  render();
}

async function driveGet(url) {
  const res = await fetch(url, { headers: { Authorization: `Bearer ${driveToken}` } });
  if (res.status === 401) { handleTokenExpired(); throw new Error('token_expired'); }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

function handleTokenExpired() {
  driveToken = null;
  syncStatus = 'noauth';
  localStorage.removeItem('diary_google_hint');
  updateSyncUI();
  showToast('Driveの認証が切れました。再ログインしてください');
}

async function getDriveFileId() {
  const res = await driveGet(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${DRIVE_FILE_NAME}'&fields=files(id,modifiedTime)`
  );
  const data = await res.json();
  return data.files?.[0]?.id || null;
}

async function syncFromDrive() {
  if (!driveToken) return;
  syncStatus = 'syncing';
  updateSyncUI();

  try {
    const fileId = await getDriveFileId();

    if (!fileId) {
      await uploadToDrive();
    } else {
      const res = await driveGet(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      const driveData = await res.json();

      const localTs = state.lastModified || 0;
      const driveTs = driveData.lastModified || 0;

      if (driveTs > localTs) {
        state = driveData;
        save(false);
        showToast('☁️ Driveから最新データを取得しました');
        render();
      } else if (localTs > driveTs) {
        await uploadToDrive();
      }
    }

    syncStatus = 'synced';
  } catch (err) {
    if (err.message !== 'token_expired') {
      syncStatus = 'error';
      console.error('Drive sync error:', err);
    }
  }

  updateSyncUI();
}

async function uploadToDrive() {
  if (!driveToken) return;

  const fileId = await getDriveFileId();
  const metadata = {
    name: DRIVE_FILE_NAME,
    ...(!fileId && { parents: ['appDataFolder'] })
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(state)], { type: 'application/json' }));

  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';

  const res = await fetch(url, {
    method: fileId ? 'PATCH' : 'POST',
    headers: { Authorization: `Bearer ${driveToken}` },
    body: form,
  });

  if (res.status === 401) { handleTokenExpired(); throw new Error('token_expired'); }
  if (!res.ok) throw new Error(`Upload HTTP ${res.status}`);
}

function updateSyncUI() {
  const badge = document.getElementById('syncBadge');
  if (!badge) return;

  const map = {
    noauth:  { icon: '',    title: 'Drive未接続（設定でログイン）' },
    idle:    { icon: '☁️',  title: 'Drive接続済み' },
    syncing: { icon: '⏳',  title: '同期中…' },
    synced:  { icon: '☁️✓', title: '同期済み' },
    error:   { icon: '⚠️',  title: '同期エラー（設定で確認）' },
  };
  const s = map[syncStatus] || map.noauth;
  badge.textContent = s.icon;
  badge.title = s.title;
}

function onSyncBadgeClick() {
  if (!driveToken) switchTab('settings');
  else syncFromDrive().then(() => showToast('同期しました'));
}

// ── STATE ──
let state = { tags: [], days: {} };
// days[YYYY-MM-DD] = { weather: '☀️', entries: [{id, tags:[], memo}] }

let currentTab = 'write';
let writeDate = today();
let writeWeather = '';
let writeEntries = []; // [{id, tags:[], memo}]
let editingDayDate = null;
let listFilterTag = null;
let tyMonth = (new Date().getMonth()+1).toString().padStart(2,'0');
let tyDay = new Date().getDate().toString().padStart(2,'0');
let searchQuery = '';
let searchTagFilter = null;

// ── STORAGE ──
function save(syncDrive = true) {
  state.lastModified = Date.now();
  localStorage.setItem('diary_v2', JSON.stringify(state));
  if (syncDrive && driveToken) {
    uploadToDrive()
      .then(() => { syncStatus = 'synced'; updateSyncUI(); })
      .catch(err => {
        if (err.message !== 'token_expired') { syncStatus = 'error'; updateSyncUI(); }
      });
  }
}
function load() {
  const r = localStorage.getItem('diary_v2');
  if (r) state = JSON.parse(r);
}

// ── UTILS ──
function today() { return new Date().toISOString().slice(0,10); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(d) {
  const [y,m,dd] = d.split('-');
  const dow = ['日','月','火','水','木','金','土'][new Date(d).getDay()];
  return `${y}年${m}月${dd}日（${dow}）`;
}
function fmtShort(d) {
  const [y,m,dd] = d.split('-');
  return `${m}/${dd}`;
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(s, q) {
  if (!q) return escHtml(s);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escHtml(s).replace(new RegExp(esc,'gi'), m => `<span class="search-hit">${m}</span>`);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function googlePhotosUrl(date) {
  return `https://photos.google.com/search/${date}`;
}

const WEATHERS = ['☀️','🌤️','⛅','🌧️','⛈️','🌨️','🌫️'];

// ── TAB ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabs button').forEach((b,i)=>{
    b.classList.toggle('active', ['write','list','tenyear','search','settings'][i]===tab);
  });
  render();
}

// ── RENDER ──
function render() {
  document.getElementById('headerDate').textContent = fmtDate(today());
  const el = document.getElementById('mainContent');
  if (currentTab==='write') el.innerHTML = renderWrite();
  else if (currentTab==='list') el.innerHTML = renderList();
  else if (currentTab==='tenyear') el.innerHTML = renderTenYear();
  else if (currentTab==='search') el.innerHTML = renderSearch();
  else el.innerHTML = renderSettings();
}

// ══ WRITE TAB ══
function initWriteForDate(date) {
  const day = state.days[date];
  writeDate = date;
  writeWeather = day ? (day.weather||'') : '';
  writeEntries = day ? JSON.parse(JSON.stringify(day.entries||[])) : [];
  if (writeEntries.length === 0) writeEntries.push({id:uid(), tags:[], memo:''});
}

function renderWrite() {
  if (editingDayDate && editingDayDate !== writeDate) {
    initWriteForDate(editingDayDate);
  } else if (!editingDayDate && writeEntries.length === 0) {
    initWriteForDate(writeDate);
  }

  const weatherBtns = WEATHERS.map(w =>
    `<span class="weather-chip${writeWeather===w?' selected':''}" onclick="selectWeather('${w}')">${w}</span>`
  ).join('');

  const entryForms = writeEntries.map((e,i) => renderSubForm(e,i)).join('');

  return `
    <div class="card">
      <div class="section-label">日付</div>
      <div class="date-row">
        <input type="date" id="writeDate" value="${writeDate}" max="${today()}" onchange="onDateChange(this.value)">
        <button class="btn-today" onclick="onDateChange('${today()}')">今日</button>
      </div>
      <div class="divider"></div>
      <div class="section-label">天気</div>
      <div class="weather-row">
        ${weatherBtns}
        <span class="weather-auto" onclick="fetchWeather()">📍 自動取得</span>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:8px">記録 <span style="color:var(--ink-ghost);font-weight:400">（複数追加できます）</span></div>
    ${entryForms}
    <button class="btn-add" onclick="addSubEntry()">＋ 記録を追加</button>
    <div style="height:12px"></div>
    <button class="btn-save" onclick="saveDayEntries()">${editingDayDate ? '更新する' : '保存する'}</button>
    ${editingDayDate ? `<button class="btn-save" style="background:var(--rule);color:var(--ink-light);margin-top:8px" onclick="cancelEdit()">キャンセル</button>` : ''}
  `;
}

function renderSubForm(e, i) {
  const tagChips = state.tags.map(t =>
    `<span class="tag-chip${e.tags.includes(t)?' selected':''}" onclick="toggleSubTag(${i},'${t}')">${t}</span>`
  ).join('');

  return `
    <div class="sub-form" id="subForm${i}">
      <div class="section-label">タグ</div>
      <div class="sub-form-tags">${tagChips || '<span style="font-size:12px;color:var(--ink-ghost)">設定でタグを追加</span>'}</div>
      <textarea placeholder="メモ…" oninput="updateSubMemo(${i},this.value)">${escHtml(e.memo)}</textarea>
      ${writeEntries.length > 1 ? `<div class="sub-form-actions"><button class="btn btn-danger" onclick="removeSubEntry(${i})">この記録を削除</button></div>` : ''}
    </div>
  `;
}

function onDateChange(date) {
  writeDate = date;
  document.getElementById('writeDate') && (document.getElementById('writeDate').value = date);
  const day = state.days[date];
  writeWeather = day ? (day.weather||'') : '';
  writeEntries = day ? JSON.parse(JSON.stringify(day.entries||[])) : [{id:uid(),tags:[],memo:''}];
  render();
}

function selectWeather(w) {
  writeWeather = writeWeather===w ? '' : w;
  render();
}

function fetchWeather() {
  if (!navigator.geolocation) { showToast('位置情報が使えません'); return; }
  showToast('位置情報を取得中…');
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const {latitude:lat, longitude:lon} = pos.coords;
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
      const data = await res.json();
      const code = data.current_weather?.weathercode ?? -1;
      writeWeather = weatherCodeToEmoji(code);
      showToast(`天気を取得しました ${writeWeather}`);
      render();
    } catch { showToast('天気の取得に失敗しました'); }
  }, () => showToast('位置情報の取得を拒否されました'));
}

function weatherCodeToEmoji(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤️';
  if (code <= 3) return '⛅';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌧️';
  if (code <= 99) return '⛈️';
  return '🌫️';
}

function toggleSubTag(i, tag) {
  const e = writeEntries[i];
  if (e.tags.includes(tag)) e.tags = e.tags.filter(t=>t!==tag);
  else e.tags.push(tag);
  render();
}

function updateSubMemo(i, val) {
  writeEntries[i].memo = val;
}

function addSubEntry() {
  writeEntries.forEach((_,i) => {
    const ta = document.querySelector(`#subForm${i} textarea`);
    if (ta) writeEntries[i].memo = ta.value;
  });
  writeEntries.push({id:uid(), tags:[], memo:''});
  render();
}

function removeSubEntry(i) {
  writeEntries.forEach((_,j) => {
    const ta = document.querySelector(`#subForm${j} textarea`);
    if (ta) writeEntries[j].memo = ta.value;
  });
  writeEntries.splice(i,1);
  render();
}

function saveDayEntries() {
  writeEntries.forEach((_,i) => {
    const ta = document.querySelector(`#subForm${i} textarea`);
    if (ta) writeEntries[i].memo = ta.value;
  });
  const valid = writeEntries.filter(e => e.memo.trim() || e.tags.length > 0);
  if (valid.length === 0) { showToast('記録を入力してください'); return; }
  state.days[writeDate] = { weather: writeWeather, entries: valid };
  save();
  showToast('保存しました ✓');
  editingDayDate = null;
  writeEntries = [{id:uid(),tags:[],memo:''}];
  writeWeather = '';
  render();
}

function cancelEdit() {
  editingDayDate = null;
  initWriteForDate(writeDate);
  render();
}

// ══ LIST TAB ══
function renderList() {
  const filterChips = ['すべて', ...state.tags].map(t =>
    `<span class="filter-chip${(t==='すべて'&&!listFilterTag)||listFilterTag===t?' active':''}" onclick="setListFilter('${t}')">${t}</span>`
  ).join('');

  let dates = Object.keys(state.days).sort((a,b)=>b.localeCompare(a));
  if (listFilterTag) {
    dates = dates.filter(d => state.days[d].entries.some(e=>e.tags.includes(listFilterTag)));
  }

  const cards = dates.length === 0
    ? `<div class="empty"><div class="icon">📭</div><p>まだ記録がありません</p></div>`
    : dates.map(d => renderDayCard(d, listFilterTag)).join('');

  return `<div class="filter-row">${filterChips}</div>${cards}`;
}

function renderDayCard(date, filterTag, highlightQ) {
  const day = state.days[date];
  let entries = day.entries || [];
  if (filterTag) entries = entries.filter(e=>e.tags.includes(filterTag));

  const entriesHtml = entries.map(e => {
    const tags = e.tags.map(t=>`<span class="sub-entry-tag">${t}</span>`).join('');
    const memo = highlightQ ? highlight(e.memo, highlightQ) : escHtml(e.memo);
    return `
      <div class="sub-entry">
        <div class="sub-entry-tags">${tags||'<span style="color:var(--ink-ghost);font-size:12px">タグなし</span>'}</div>
        <div class="sub-entry-memo">${memo}</div>
        <div class="sub-entry-actions">
          <button class="btn-xs edit" onclick="editDay('${date}')">編集</button>
          <button class="btn-xs del" onclick="deleteDay('${date}')">削除</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="day-card">
      <div class="day-header">
        <span class="day-header-date">${fmtDate(date)}</span>
        <div class="day-header-right">
          ${day.weather ? `<span class="day-weather">${day.weather}</span>` : ''}
          <button class="btn-photos" onclick="openPhotos('${date}')">📷 フォト</button>
        </div>
      </div>
      <div class="day-body">${entriesHtml}</div>
    </div>`;
}

function setListFilter(tag) {
  listFilterTag = tag==='すべて' ? null : tag;
  render();
}

function openPhotos(date) {
  window.open(googlePhotosUrl(date), '_blank');
}

function editDay(date) {
  editingDayDate = date;
  initWriteForDate(date);
  switchTab('write');
}

function deleteDay(date) {
  if (!confirm(`${fmtDate(date)}の記録をすべて削除しますか？`)) return;
  delete state.days[date];
  save(); showToast('削除しました'); render();
}

// ══ 10-YEAR TAB ══
function renderTenYear() {
  const months = Array.from({length:12},(_,i)=>{
    const m=(i+1).toString().padStart(2,'0');
    return `<option value="${m}"${tyMonth===m?' selected':''}>${m}月</option>`;
  }).join('');
  const maxDay = new Date(2000,parseInt(tyMonth),0).getDate();
  const days = Array.from({length:maxDay},(_,i)=>{
    const d=(i+1).toString().padStart(2,'0');
    return `<option value="${d}"${tyDay===d?' selected':''}>${d}日</option>`;
  }).join('');

  const mmdd = `${tyMonth}-${tyDay}`;
  const matched = Object.keys(state.days)
    .filter(d=>d.slice(5)===mmdd)
    .sort((a,b)=>b.localeCompare(a));

  const blocks = matched.length === 0
    ? `<div class="empty"><div class="icon">🗓️</div><p>${parseInt(tyMonth)}月${parseInt(tyDay)}日の記録はまだありません</p></div>`
    : matched.map(date => {
        const day = state.days[date];
        const entries = (day.entries||[]).map(e => {
          const tags = e.tags.map(t=>`<span class="sub-entry-tag">${t}</span>`).join('');
          return `<div class="sub-entry">
            <div class="sub-entry-tags">${tags||''}</div>
            <div class="sub-entry-memo">${escHtml(e.memo)}</div>
          </div>`;
        }).join('');
        return `
          <div class="year-block">
            <div class="year-block-header">
              <span>${date.slice(0,4)}年 ${day.weather||''}</span>
              <button class="btn-photos" onclick="openPhotos('${date}')">📷</button>
            </div>
            <div class="day-body">${entries}</div>
          </div>`;
      }).join('');

  return `
    <div class="card">
      <div class="section-label">同じ日を振り返る</div>
      <div class="mmdd-row">
        <select onchange="tyMonth=this.value;render()">${months}</select>
        <span class="mmdd-sep">/</span>
        <select onchange="tyDay=this.value;render()">${days}</select>
      </div>
    </div>
    ${blocks}`;
}

// ══ SEARCH TAB ══
function getSearchResultsHtml() {
  if (!searchQuery.trim() && !searchTagFilter) return '';
  const q = searchQuery.trim().toLowerCase();
  let dates = Object.keys(state.days).sort((a,b)=>b.localeCompare(a));
  dates = dates.filter(date => {
    const day = state.days[date];
    return (day.entries||[]).some(e => {
      const tagMatch = !searchTagFilter || e.tags.includes(searchTagFilter);
      const textMatch = !q || e.memo.toLowerCase().includes(q) || e.tags.some(t=>t.toLowerCase().includes(q));
      return tagMatch && textMatch;
    });
  });
  if (dates.length === 0) return `<div class="empty"><div class="icon">🔍</div><p>見つかりませんでした</p></div>`;
  return dates.map(d => renderDayCard(d, searchTagFilter, searchQuery.trim())).join('');
}

function onSearchInput(e, val) {
  searchQuery = val;
  const r = document.getElementById('searchResults');
  if (r) r.innerHTML = getSearchResultsHtml();
}

function renderSearch() {
  const tagChips = ['すべて',...state.tags].map(t=>
    `<span class="filter-chip${(t==='すべて'&&!searchTagFilter)||searchTagFilter===t?' active':''}" onclick="setSearchTag('${t}')">${t}</span>`
  ).join('');

  return `
    <div class="search-box">
      <input type="text" placeholder="メモ・タグを検索…" value="${escHtml(searchQuery)}"
        oninput="onSearchInput(event,this.value)" autofocus>
    </div>
    <div class="filter-row">${tagChips}</div>
    <div id="searchResults">${getSearchResultsHtml()}</div>`;
}

function setSearchTag(t) {
  searchTagFilter = t==='すべて' ? null : t;
  render();
}

// ══ SETTINGS TAB ══
function renderSettings() {
  const tagItems = state.tags.map((t,i)=>`
    <div class="tag-manage-row">
      <span class="tag-chip" style="cursor:default">${t}</span>
      <button class="btn btn-danger" onclick="deleteTag(${i})">削除</button>
    </div>`).join('');

  const totalEntries = Object.values(state.days).reduce((s,d)=>s+(d.entries||[]).length,0);

  const driveSection = GAPI_CLIENT_ID === 'YOUR_CLIENT_ID_HERE'
    ? `<div class="card">
        <div class="section-label">Google Drive 同期</div>
        <p style="font-size:12px;color:var(--ink-ghost);margin-bottom:12px">
          Google Cloud ConsoleでOAuthクライアントIDを作成し、<br>
          index.html の <code>YOUR_CLIENT_ID_HERE</code> を置き換えてください。
        </p>
        <p style="font-size:11px;color:var(--accent-mid)">📋 セットアップ手順はREADME参照</p>
      </div>`
    : driveToken
      ? `<div class="card">
          <div class="section-label">Google Drive 同期</div>
          <div class="drive-status">
            <div class="drive-status-dot ${syncStatus}"></div>
            <span style="flex:1;color:var(--ink-light)">${
              { synced:'同期済み', syncing:'同期中…', error:'同期エラー', idle:'接続済み', noauth:'未接続' }[syncStatus]
            }</span>
          </div>
          <p style="font-size:12px;color:var(--ink-ghost);margin-bottom:12px">
            保存のたびに自動でDriveにアップロードされます。
          </p>
          <div class="export-row">
            <button class="btn btn-primary" onclick="syncFromDrive().then(()=>showToast('同期しました'))">🔄 今すぐ同期</button>
            <button class="btn btn-ghost" onclick="signOutGoogle()">ログアウト</button>
          </div>
        </div>`
      : `<div class="card">
          <div class="section-label">Google Drive 同期</div>
          <p style="font-size:12px;color:var(--ink-ghost);margin-bottom:12px">
            Googleアカウントでログインすると、日記データを<br>
            Google Driveに自動バックアップできます。
          </p>
          <button class="btn btn-primary" onclick="signInWithGoogle()">🔑 Googleでログイン</button>
        </div>`;

  return `
    <div class="card">
      <div class="section-label">タグ管理</div>
      ${tagItems||'<p style="font-size:13px;color:var(--ink-ghost);margin-bottom:10px">まだタグがありません</p>'}
      <div class="tag-add-row">
        <input id="newTagInput" placeholder="新しいタグ名" maxlength="20" onkeydown="if(event.key==='Enter')addTag()">
        <button class="btn btn-primary" onclick="addTag()">追加</button>
      </div>
    </div>
    ${driveSection}
    <div class="card">
      <div class="section-label">データ管理</div>
      <p style="font-size:12px;color:var(--ink-ghost);margin-bottom:12px">
        データはこの端末のブラウザに保存されています。<br>定期的にバックアップを取ることをおすすめします。
      </p>
      <div class="export-row">
        <button class="btn btn-primary" onclick="exportData()">📤 エクスポート</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">📥 インポート</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑 全削除</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>
    <div style="text-align:center;padding:16px;font-size:11px;color:var(--ink-ghost)">
      📓 My Diary — ${Object.keys(state.days).length}日 / ${totalEntries}件の記録
    </div>`;
}

function addTag() {
  const input = document.getElementById('newTagInput');
  const tag = input.value.trim();
  if (!tag) return;
  if (state.tags.includes(tag)) { showToast('同じタグがすでにあります'); return; }
  state.tags.push(tag);
  save(); showToast(`「${tag}」を追加しました`); render();
}

function deleteTag(i) {
  const tag = state.tags[i];
  if (!confirm(`「${tag}」を削除しますか？\n各記録のタグも削除されます。`)) return;
  state.tags.splice(i,1);
  Object.values(state.days).forEach(day => {
    (day.entries||[]).forEach(e => { e.tags = e.tags.filter(t=>t!==tag); });
  });
  save(); showToast('削除しました'); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diary_${today()}.json`;
  a.click();
  showToast('エクスポートしました');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.days || !data.tags) throw new Error();
      if (!confirm('インポートします。現在のデータと統合されます。よろしいですか？')) return;
      data.tags.forEach(t=>{ if(!state.tags.includes(t)) state.tags.push(t); });
      Object.keys(data.days).forEach(d=>{ if(!state.days[d]) state.days[d]=data.days[d]; });
      save(); showToast('インポート完了 ✓'); render();
    } catch { showToast('ファイルが正しくありません'); }
  };
  reader.readAsText(file);
  input.value='';
}

function clearAll() {
  if (!confirm('全データを削除します。取り消せません。よろしいですか？')) return;
  state = {tags:[], days:{}};
  save(); showToast('削除しました'); render();
}

// ── INIT ──
load();
render();
updateSyncUI();

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
</script>

<!-- Google Identity Services (for Drive OAuth) -->
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>

</body>
